      <stop offset="1" stop-color="#61d7ff"/>
    </linearGradient>
    <filter id="appkit-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
