<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-labelledby="appkit-title appkit-desc">
  <title id="appkit-title">AppKit</title>
  <desc id="appkit-desc">A hexagonal product-surface console with typed DTO tiles, bridge rails, and a no-bypass boundary.</desc>
